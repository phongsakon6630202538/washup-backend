<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASH UP - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="src/register.css">
</head>
<body>
    <div class="container">
        <div class="image-section">
            <span class="brand-name">Register</span>
        </div>

        <div class="form-section">
            <h2>สมัครสมาชิกใหม่</h2>

            <form id="registerForm">
                <div class="input-group">
                    <label>ชื่อ - นามสกุล</label>
                    <div class="input-wrapper">
                        <input type="text" id="fullName" placeholder="กรอกชื่อ-นามสกุล เช่น สมชาติ ดีใจ" required>
                        <i class="fa-regular fa-user"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>ชื่อผู้ใช้งาน</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้ (Username)" required>
                        <i class="fa-regular fa-user"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>เบอร์โทร</label>
                    <div class="input-wrapper">
                        <input type="tel" id="phone" placeholder="09X-XXX-XXXX" required>
                        <i class="fa-regular fa-envelope"></i> </div>
                </div>

                <div class="input-group">
                    <label>รหัสผ่าน</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="ตั้งรหัสผ่าน" required>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>ยืนยันรหัสผ่านอีกครั้ง</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" placeholder="ยืนยันรหัสผ่าน" required>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>

                <button type="submit" class="register-btn">สมัครสมาชิก</button>
            </form>

            <p class="footer-text">
                มีสมาชิกแล้วใช่ไหม? <a href="login.html">เข้าสู่ระบบ</a>
            </p>
        </div>
    </div>

    <script src="src/register.js"></script>
</body>
</html>
