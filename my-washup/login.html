<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - WASH UP</title>
    <link rel="stylesheet" href="src/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-image">
            <img src="https://images.unsplash.com/photo-1520340356584-f9917d1eea6f?auto=format&fit=crop&w=1000&q=80" alt="Car Wash">
        </div>

        <div class="login-form-section">
            <div class="form-wrapper">
                <div class="logo">
                    <img src="public/image/logowashup.png" alt="WASH UP Logo">
                </div>
                
                <h2>เข้าสู่ระบบ</h2>
                <p>ยินดีต้อนรับสู่เว็บไซต์ WASH UP</p>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="username">ชื่อผู้ใช้งาน</label>
                        <div class="input-icon">
                            <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้" required>
                            <i class="fa-regular fa-user"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">รหัสผ่าน</label>
                        <div class="input-icon">
                            <input type="password" id="password" placeholder="กรอกรหัสผ่าน..." required>
                            <i class="fa-solid fa-lock"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
                </form>

                <p class="register-link">ยังไม่มีสมาชิกใช่ไหม? <a href="register.html">สมัครสมาชิก</a></p>
            </div>
        </div>
    </div>

    <script src="src/login.js"></script>
</body>
</html>
