<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>เพิ่มรถของคุณ - WASH UP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Kanit:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./src/style.css" />
    <link rel="stylesheet" href="./src/nav.css" />
    <link rel="stylesheet" href="./src/footer.css" />
    <link rel="stylesheet" href="./src/popupadd.css" />
</head>
<body>
    <div class="wrapper">
        <div id="navbar-placeholder"></div>

        <div class="main-content">
            <div class="add-car-card">
                <header>
                    <h1>เพิ่มรถของคุณ</h1>
                    <p>ใส่ข้อมูลรายละเอียดรถของคุณเพื่อใช้บริการร้าน WASH UP</p>
                </header>

                <form id="carForm">
                    <div class="form-group">
                        <label><span class="badge">1</span> ทะเบียนรถยนต์</label>
                        <input type="text" id="license_plate" placeholder="กรอกทะเบียนรถยนต์ของคุณ เช่น กข 1234 กรุงเทพมหานคร" required>
                    </div>

                    <div class="type-selector">

                    <div class="type-selector">
                      <label class="type-option active">
                          <input type="radio" name="car_type" value="1" checked class="radio-input">
                          <span class="dot"></span>
                          รถเก๋ง
                      </label>

                      <label class="type-option">
                          <input type="radio" name="car_type" value="2" class="radio-input">
                          <span class="dot"></span>
                          รถกระบะ / SUV
                      </label>
                  </div>
                  </div>

                    <div class="form-row">
                        <div class="form-group half">
                            <label><span class="badge">3</span> แบรนด์รถ</label>
                            <input type="text" id="brand" placeholder="เช่น HONDA , TOYOTA" required>
                        </div>
                        <div class="form-group half">
                            <label><span class="badge">4</span> รุ่นรถ</label>
                            <input type="text" id="model" placeholder="เช่น CIVIC , YARIS" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label><span class="badge">5</span> สีรถ</label>
                        <input type="text" id="color" placeholder="ระบุสีรถ เช่น ดำ ขาว แดง" required>
                    </div>

                    <div class="form-group">
                        <label><span class="badge">6</span> โน้ต <small>(OPTIONAL)</small></label>
                        <input type="text" id="note" placeholder="ระบุข้อมูลเพิ่มเติม">
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-cancel">ยกเลิก</button>
                        <button type="submit" class="btn-save">+ บันทึกข้อมูลรถ</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="footer-placeholder"></div>
    </div>

    <script src="main.js"></script>
    <script type="module" src="/src/popupadd.js"></script>
</body>
</html>
